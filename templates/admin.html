<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Risk Admin | Terminal Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white p-10 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-black text-indigo-400 italic uppercase tracking-tighter">Admin <span class="text-white">Center</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">System Configuration & Data Ingression</p>
            </div>
            <div class="flex gap-3">
                <a href="/" class="text-[10px] font-bold border border-slate-700 px-6 py-3 rounded-xl hover:bg-slate-800 transition">PORTFOLIO DASHBOARD</a>
                <a href="/issuers" class="text-[10px] font-bold border border-slate-700 px-6 py-3 rounded-xl hover:bg-slate-800 transition">ISSUER MONITOR</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-8">
                <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800 shadow-xl">
                    <h3 class="text-[10px] font-black text-indigo-400 uppercase mb-4 tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-indigo-500 rounded-full"></span> Global FX Settings
                    </h3>
                    <form action="/update-settings" method="POST" class="flex gap-2">
                        <div class="flex-grow">
                            <label class="block text-[9px] text-slate-500 mb-1 font-bold uppercase">USD/IDR Spot Rate</label>
                            <input type="number" name="fx_rate" value="{{ settings.fx_rate }}" step="1" class="w-full bg-black border border-slate-700 p-3 rounded-lg font-mono text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <button class="self-end bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-lg text-[10px] font-black uppercase transition shadow-lg shadow-indigo-500/20">UPDATE</button>
                    </form>
                </div>

                <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800 shadow-xl">
                    <h3 class="text-[10px] font-black text-emerald-400 uppercase mb-4 tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Portfolio Limit Overrides
                    </h3>
                    <form action="/update-settings" method="POST" class="space-y-4">
                        <div>
                            <label class="block text-[9px] text-slate-500 mb-1 font-bold uppercase">Target Strategy</label>
                            <select name="port_id" class="w-full bg-black border border-slate-700 p-3 rounded-lg text-xs font-bold text-white uppercase focus:outline-none">
                                {% for pid, val in settings.limits.items() %}
                                <option value="{{ pid }}">{{ pid }} (Current: {{ val }} Tn/Mn)</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-[9px] text-slate-500 mb-1 font-bold uppercase">New Nominal Limit</label>
                            <input type="number" step="0.1" name="limit_val" placeholder="Input Numeric (Tn or Mn)" class="w-full bg-black border border-slate-700 p-3 rounded-lg text-xs font-mono text-white focus:outline-none">
                        </div>
                        <button class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg text-[10px] font-black uppercase transition shadow-lg shadow-emerald-500/20">SAVE LIMIT CHANGE</button>
                    </form>
                </div>
            </div>

            <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800 shadow-xl flex flex-col">
                <h3 class="text-[10px] font-black text-amber-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-amber-500 rounded-full"></span> Data Ingestion Engine
                </h3>
                
                <div class="space-y-10 flex-grow">
                    <div class="relative group">
                        <label class="text-[10px] font-black text-slate-400 block mb-3 uppercase tracking-tighter">1. Daily Portfolio Data (CSV)</label>
                        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-2">
                            <input type="hidden" name="target" value="FI-SISTEM.csv">
                            <div class="border-2 border-dashed border-slate-800 group-hover:border-indigo-500/50 rounded-xl p-6 text-center transition bg-black/30">
                                <input type="file" name="file" class="text-[10px] text-slate-500 cursor-pointer">
                                <p class="text-[9px] text-slate-600 mt-2 italic font-medium">Expected format: FI-SISTEM Export</p>
                            </div>
                            <button class="w-full bg-indigo-600/10 hover:bg-indigo-600 border border-indigo-600/50 py-3 rounded-lg text-[10px] font-black uppercase transition">Upload FI-SISTEM</button>
                        </form>
                    </div>

                    <div class="relative group">
                        <label class="text-[10px] font-black text-slate-400 block mb-3 uppercase tracking-tighter">2. Issuer Master Limits (CSV)</label>
                        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-2">
                            <input type="hidden" name="target" value="ISSUER_LIMITS.csv">
                            <div class="border-2 border-dashed border-slate-800 group-hover:border-emerald-500/50 rounded-xl p-6 text-center transition bg-black/30">
                                <input type="file" name="file" class="text-[10px] text-slate-500 cursor-pointer">
                                <p class="text-[9px] text-slate-600 mt-2 italic font-medium">Cols: ISSUER, LIMIT_AMOUNT</p>
                            </div>
                            <button class="w-full bg-emerald-600/10 hover:bg-emerald-600 border border-emerald-600/50 py-3 rounded-lg text-[10px] font-black uppercase transition">Upload Issuer Limits</button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                    <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">Version 7.6.1 Live Production</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
