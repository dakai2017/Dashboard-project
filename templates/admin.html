<div class="card p-6 bg-[#0f172a] rounded-xl border border-slate-800">
    <h3 class="text-xs font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Data Management</h3>
    
    <div class="space-y-6">
        <form action="/upload" method="POST" enctype="multipart/form-data" class="border-b border-slate-800 pb-4">
            <label class="text-[10px] font-bold text-indigo-400 block mb-2">1. BOND DATA (FI-SISTEM)</label>
            <input type="hidden" name="target" value="FI-SISTEM.csv">
            <input type="file" name="file" class="text-xs mb-2">
            <button class="w-full bg-white text-black py-2 rounded font-black text-[10px] uppercase">Upload Portfolio</button>
        </form>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <label class="text-[10px] font-bold text-emerald-400 block mb-2">2. ISSUER LIMITS (CSV)</label>
            <input type="hidden" name="target" value="ISSUER_LIMITS.csv">
            <input type="file" name="file" class="text-xs mb-2">
            <button class="w-full bg-emerald-600 text-white py-2 rounded font-black text-[10px] uppercase">Upload Limits</button>
        </form>
    </div>
</div>
