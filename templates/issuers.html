<!DOCTYPE html>
<html>
<head>
    <title>Risk Terminal | Issuers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white p-10">
    <nav class="flex justify-between mb-10">
        <h1 class="text-2xl font-black italic text-indigo-400">ISSUER MONITORING</h1>
        <div class="flex gap-4">
            <a href="/" class="text-[10px] font-bold border border-slate-700 px-4 py-2 rounded">PORTFOLIO</a>
            <a href="/admin" class="text-[10px] font-bold bg-indigo-600 px-4 py-2 rounded">ADMIN</a>
        </div>
    </nav>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for iss in issuers %}
        <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800">
            <div class="flex justify-between mb-2">
                <span class="font-bold uppercase text-sm">{{ iss.name }}</span>
                <span class="text-xs {{ 'text-red-500' if iss.util > 100 else 'text-indigo-400' }}">{{ iss.util }}%</span>
            </div>
            <div class="bg-slate-900 h-1.5 rounded-full overflow-hidden mb-4">
                <div class="h-full bg-indigo-500" style="width: {{ [iss.util, 100]|min }}%"></div>
            </div>
            <div class="flex justify-between text-[10px] text-slate-500">
                <span>ACT: {{ iss.act }}</span>
                <span>LIM: {{ iss.lim }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
