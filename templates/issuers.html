<!DOCTYPE html>
<html lang="en">
<head>
    <title>Risk Terminal | Issuer Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white p-8 font-sans">
    <nav class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-black italic text-indigo-400 uppercase">ISSUER <span class="text-white">CONCENTRATION</span></h1>
        <div class="flex gap-4">
            <a href="/" class="text-[10px] font-bold border border-slate-700 px-4 py-2 rounded hover:bg-slate-800">PORTFOLIO VIEW</a>
            <a href="/admin" class="text-[10px] font-bold bg-indigo-600 px-4 py-2 rounded">ADMIN</a>
        </div>
    </nav>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for iss in issuers %}
        <div class="bg-[#0f172a] border {{ 'border-red-500/50 shadow-lg shadow-red-500/10' if iss.util > 100 else 'border-slate-800' }} p-5 rounded-2xl">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-black text-sm uppercase tracking-tight">{{ iss.name }}</h3>
                    <p class="text-[9px] text-slate-500 font-bold">TOTAL EXPOSURE</p>
                </div>
                <span class="mono text-xs font-bold {{ 'text-red-500' if iss.util > 100 else 'text-indigo-400' }}">{{ iss.util }}%</span>
            </div>
            
            <div class="progress-bg bg-slate-900 h-2 rounded-full overflow-hidden mb-4">
                <div class="h-full {{ 'bg-red-500' if iss.util > 100 else 'bg-indigo-500' }}" style="width: {{ [iss.util, 100]|min }}%"></div>
            </div>

            <div class="flex justify-between text-[10px] font-mono">
                <div><span class="text-slate-600 block">ACTUAL</span> {{ iss.act }}</div>
                <div class="text-right"><span class="text-slate-600 block">LIMIT</span> {{ iss.lim }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
